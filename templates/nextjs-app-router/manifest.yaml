template_id: nextjs-app-router
version: "0.1.0"
display_name: "Next.js App Router"
description: "Next.js 14+ project using App Router with React Server Components"

# ======== detect_signals ========
detect_signals:
  required:
    - type: file_exists
      path: package.json

  boosters:
    - type: package_dependency
      file: package.json
      key: dependencies
      pattern: "next"
      weight: 40
    - type: package_dependency
      file: package.json
      key: devDependencies
      pattern: "next"
      weight: 40
    - type: dir_exists
      path: app
      weight: 20
    - type: dir_exists
      path: src/app
      weight: 20
    - type: file_exists
      path: next.config.ts
      weight: 10
    - type: file_exists
      path: next.config.js
      weight: 10
    - type: file_exists
      path: next.config.mjs
      weight: 10
    - type: file_exists
      path: tsconfig.json
      weight: 5

  confidence_thresholds:
    high: 50
    medium: 25

# ======== placeholders ========
placeholders:
  app_root:
    description: "App Router root directory"
    required: true
    detect_strategy: first_match
    candidates:
      - src/app
      - app
    ambiguity_policy: first
    default: app

  components_root:
    description: "Shared components directory"
    required: false
    detect_strategy: first_match
    candidates:
      - src/components
      - components
      - src/app/_components
    ambiguity_policy: first
    default: null

  lib_root:
    description: "Library/utilities directory"
    required: false
    detect_strategy: first_match
    candidates:
      - src/lib
      - lib
      - src/utils
    ambiguity_policy: first
    default: null

# ======== seed_documents ========
seed_documents:
  - doc_id: nextjs-architecture-root
    title: "Architecture Root: Next.js App Router"
    kind: guideline
    file: architecture_root.md

  - doc_id: nextjs-rsc-boundaries
    title: "RSC Boundaries & Directives"
    kind: constraint
    file: rsc_boundaries.md

  - doc_id: nextjs-data-patterns
    title: "Data Fetching Patterns"
    kind: pattern
    file: data_patterns.md

  - doc_id: nextjs-file-conventions
    title: "File Conventions & Routing"
    kind: constraint
    file: file_conventions.md

  - doc_id: nextjs-error-handling
    title: "Error Handling & Loading States"
    kind: guideline
    file: error_handling.md

# ======== seed_edges ========
seed_edges:
  # All app files get the architecture root
  - source_type: path
    source_value: "{{app_root}}/**"
    target_doc_id: nextjs-architecture-root
    edge_type: path_requires
    priority: 200

  # Page and layout files need file conventions
  - source_type: path
    source_value: "{{app_root}}/**/page.tsx"
    target_doc_id: nextjs-file-conventions
    edge_type: path_requires
    priority: 80

  - source_type: path
    source_value: "{{app_root}}/**/layout.tsx"
    target_doc_id: nextjs-file-conventions
    edge_type: path_requires
    priority: 80

  # Page files need data patterns (primary data fetching point)
  - source_type: path
    source_value: "{{app_root}}/**/page.tsx"
    target_doc_id: nextjs-data-patterns
    edge_type: path_requires
    priority: 60

  # Route handlers need data patterns
  - source_type: path
    source_value: "{{app_root}}/**/route.ts"
    target_doc_id: nextjs-data-patterns
    edge_type: path_requires
    priority: 60

  # Error/loading files need error handling guide
  - source_type: path
    source_value: "{{app_root}}/**/error.tsx"
    target_doc_id: nextjs-error-handling
    edge_type: path_requires
    priority: 80

  - source_type: path
    source_value: "{{app_root}}/**/loading.tsx"
    target_doc_id: nextjs-error-handling
    edge_type: path_requires
    priority: 80

  - source_type: path
    source_value: "{{app_root}}/**/not-found.tsx"
    target_doc_id: nextjs-error-handling
    edge_type: path_requires
    priority: 80

  # Components need RSC boundary awareness
  - source_type: path
    source_value: "{{components_root}}/**"
    target_doc_id: nextjs-rsc-boundaries
    edge_type: path_requires
    priority: 80
    when:
      placeholder: components_root
      operator: is_not_null

  # Server Actions files need data patterns + RSC boundaries
  - source_type: path
    source_value: "{{app_root}}/**/actions.ts"
    target_doc_id: nextjs-data-patterns
    edge_type: path_requires
    priority: 60

  - source_type: path
    source_value: "{{app_root}}/**/actions.ts"
    target_doc_id: nextjs-rsc-boundaries
    edge_type: path_requires
    priority: 60

  # Lib/utils files get architecture root
  - source_type: path
    source_value: "{{lib_root}}/**"
    target_doc_id: nextjs-architecture-root
    edge_type: path_requires
    priority: 200
    when:
      placeholder: lib_root
      operator: is_not_null

  # Layer requires
  - source_type: layer
    source_value: Page
    target_doc_id: nextjs-data-patterns
    edge_type: layer_requires
    priority: 100

  - source_type: layer
    source_value: Page
    target_doc_id: nextjs-file-conventions
    edge_type: layer_requires
    priority: 100

  - source_type: layer
    source_value: API
    target_doc_id: nextjs-data-patterns
    edge_type: layer_requires
    priority: 100

  - source_type: layer
    source_value: Component
    target_doc_id: nextjs-rsc-boundaries
    edge_type: layer_requires
    priority: 100

  # Command requires: review always gets architecture + RSC boundaries
  - source_type: command
    source_value: review
    target_doc_id: nextjs-rsc-boundaries
    edge_type: command_requires
    priority: 100

  # Doc dependencies
  - source_type: doc
    source_value: nextjs-rsc-boundaries
    target_doc_id: nextjs-architecture-root
    edge_type: doc_depends_on
    priority: 100

  - source_type: doc
    source_value: nextjs-data-patterns
    target_doc_id: nextjs-architecture-root
    edge_type: doc_depends_on
    priority: 100

  - source_type: doc
    source_value: nextjs-file-conventions
    target_doc_id: nextjs-architecture-root
    edge_type: doc_depends_on
    priority: 100

  - source_type: doc
    source_value: nextjs-error-handling
    target_doc_id: nextjs-file-conventions
    edge_type: doc_depends_on
    priority: 100

# ======== seed_layer_rules ========
seed_layer_rules:
  - path_pattern: "{{app_root}}/**/page.tsx"
    layer_name: Page
    priority: 100

  - path_pattern: "{{app_root}}/**/layout.tsx"
    layer_name: Layout
    priority: 100

  - path_pattern: "{{app_root}}/**/route.ts"
    layer_name: API
    priority: 100

  - path_pattern: "{{components_root}}/**"
    layer_name: Component
    priority: 100
    when:
      placeholder: components_root
      operator: is_not_null
